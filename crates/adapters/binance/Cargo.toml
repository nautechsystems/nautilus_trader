[package]
name = "nautilus-binance"
readme = "README.md"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Binance exchange integration adapter for the Nautilus trading engine"
categories.workspace = true
keywords.workspace = true
documentation.workspace = true
repository.workspace = true
homepage.workspace = true

[lints]
workspace = true

[lib]
name = "nautilus_binance"
crate-type = ["rlib"]

[features]
default = ["high-precision"]
examples = ["nautilus-live/node", "nautilus-network/transport-sockudo"]
high-precision = ["nautilus-model/high-precision"]
extension-module = [
  "nautilus-common/extension-module",
  "nautilus-core/extension-module",
  "nautilus-live/extension-module",
  "nautilus-model/extension-module",
  "nautilus-network/extension-module",
  "pyo3/extension-module",
  "python",
]
python = [
  "dep:nautilus-system",
  "nautilus-common/python",
  "nautilus-core/python",
  "nautilus-live/python",
  "nautilus-model/python",
  "nautilus-network/python",
  "nautilus-serialization/python",
  "nautilus-system/python",
  "pyo3",
  "pyo3-stub-gen",
]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
nautilus-common = { workspace = true, features = ["live"] }
nautilus-core = { workspace = true }
nautilus-live = { workspace = true }
nautilus-model = { workspace = true }
nautilus-network = { workspace = true }
nautilus-serialization = { workspace = true, features = ["sbe", "arrow"] }
nautilus-system = { workspace = true, optional = true }

ahash = { workspace = true }
anyhow = { workspace = true }
arc-swap = { workspace = true }
arrow = { workspace = true }
async-stream = { workspace = true }
async-trait = { workspace = true }
aws-lc-rs = { workspace = true }
base64 = { workspace = true }
bon = { workspace = true }
chrono = { workspace = true }
dashmap = { workspace = true }
derive_builder = { workspace = true }
ed25519-dalek = { workspace = true }
futures-util = { workspace = true }
log = { workspace = true }
rust_decimal = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_urlencoded = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-tungstenite = { workspace = true }
tokio-util = { workspace = true }
ustr = { workspace = true }
zeroize = { workspace = true }

pyo3 = { workspace = true, optional = true }
pyo3-stub-gen = { workspace = true, optional = true }

[dev-dependencies]
nautilus-testkit = { workspace = true }
nautilus-trading = { workspace = true }

axum = { workspace = true }
criterion = { workspace = true }
dotenvy = { workspace = true }
rstest = { workspace = true }
rust_decimal_macros = { workspace = true }

# Run with `cargo bench -p nautilus-binance --bench encoder`
[[bench]]
name = "encoder"
harness = false

[[bin]]
name = "binance-spot-http-public"
path = "bin/http_public.rs"
doc = false
test = false

[[bin]]
name = "binance-spot-ws-data"
path = "bin/ws_spot_data.rs"
doc = false
test = false

[[bin]]
name = "binance-spot-http-capture-fixtures"
path = "bin/capture_spot_http_fixtures.rs"
doc = false
test = false

[[bin]]
name = "binance-spot-ws-user-data-capture"
path = "bin/capture_spot_ws_user_data.rs"
doc = false
test = false

# Run with `cargo run --example binance-spot-data-tester --package nautilus-binance --features examples`
[[example]]
name = "binance-spot-data-tester"
path = "examples/spot/node_data_tester.rs"
required-features = ["examples"]
doc = false

# Run with `cargo run --example binance-spot-exec-tester --package nautilus-binance --features examples`
[[example]]
name = "binance-spot-exec-tester"
path = "examples/spot/node_exec_tester.rs"
required-features = ["examples"]
doc = false

# Run with `cargo run --example binance-futures-data-tester --package nautilus-binance --features examples`
[[example]]
name = "binance-futures-data-tester"
path = "examples/futures/node_data_tester.rs"
required-features = ["examples"]
doc = false

# Run with `cargo run --example binance-futures-exec-tester --package nautilus-binance --features examples`
[[example]]
name = "binance-futures-exec-tester"
path = "examples/futures/node_exec_tester.rs"
required-features = ["examples"]
doc = false

# Run with `cargo run --example binance-futures-exec-trailing-stop-tester --package nautilus-binance --features examples`
[[example]]
name = "binance-futures-exec-trailing-stop-tester"
path = "examples/futures/node_exec_trailing_stop_tester.rs"
required-features = ["examples"]
doc = false
