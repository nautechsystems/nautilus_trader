[package]
name = "nautilus-kraken"
readme = "README.md"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Kraken Pro exchange integration adapter for the Nautilus trading engine"
categories.workspace = true
keywords.workspace = true
documentation.workspace = true
repository.workspace = true
homepage.workspace = true

[lints]
workspace = true

[lib]
name = "nautilus_kraken"
crate-type = ["rlib"]

[features]
default = ["high-precision"]
examples = [
  "dep:nautilus-backtest",
  "dep:nautilus-tardis",
  "nautilus-live/node",
  "nautilus-network/transport-sockudo",
  "nautilus-trading/examples",
]
python = [
  "dep:nautilus-system",
  "nautilus-common/python",
  "nautilus-core/python",
  "nautilus-live/python",
  "nautilus-model/python",
  "nautilus-network/python",
  "nautilus-system/python",
  "pyo3",
  "pyo3-async-runtimes",
  "pyo3-stub-gen",
]
extension-module = [
  "nautilus-common/extension-module",
  "nautilus-core/extension-module",
  "nautilus-live/extension-module",
  "nautilus-model/extension-module",
  "nautilus-network/extension-module",
  "pyo3/extension-module",
  "python",
]
high-precision = ["nautilus-model/high-precision"]

[dependencies]
nautilus-common = { workspace = true, features = ["live"] }
nautilus-core = { workspace = true }
nautilus-live = { workspace = true }
nautilus-model = { workspace = true }
nautilus-network = { workspace = true }
nautilus-system = { workspace = true, optional = true }

ahash = { workspace = true }
anyhow = { workspace = true }
arc-swap = { workspace = true }
async-stream = { workspace = true }
async-trait = { workspace = true }
aws-lc-rs = { workspace = true }
base64 = { workspace = true }
bon = { workspace = true }
chrono = { workspace = true }
dashmap = { workspace = true }
derive_builder = { workspace = true }
futures-util = { workspace = true }
indexmap = { workspace = true }
log = { workspace = true }
rust_decimal = { workspace = true }
rust_decimal_macros = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_urlencoded = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-tungstenite = { workspace = true }
tokio-util = { workspace = true }
ustr = { workspace = true }
zeroize = { workspace = true }

nautilus-backtest = { workspace = true, optional = true }
nautilus-tardis = { workspace = true, optional = true }

pyo3 = { workspace = true, optional = true }
pyo3-async-runtimes = { workspace = true, optional = true }
pyo3-stub-gen = { workspace = true, optional = true }

[dev-dependencies]
nautilus-testkit = { workspace = true }
nautilus-trading = { workspace = true }

axum = { workspace = true }
criterion = { workspace = true }
dotenvy = { workspace = true }
rstest = { workspace = true }

# Run with `cargo bench -p nautilus-kraken --bench websocket`
[[bench]]
name = "websocket"
harness = false

[[bin]]
name = "kraken-http-spot-raw"
path = "bin/http_spot_raw.rs"
doc = false
test = false

[[bin]]
name = "kraken-http-spot-public"
path = "bin/http_spot_public.rs"
doc = false
test = false

[[bin]]
name = "kraken-ws-spot-data"
path = "bin/ws_spot_data.rs"
doc = false
test = false

# Run with `cargo run -p nautilus-kraken --example kraken-data-tester --features examples`
[[example]]
name = "kraken-data-tester"
path = "examples/node_data_tester.rs"
required-features = ["examples"]
doc = false

# Run with `cargo run -p nautilus-kraken --example kraken-exec-tester --features examples`
[[example]]
name = "kraken-exec-tester"
path = "examples/node_exec_tester.rs"
required-features = ["examples"]
doc = false

# Run with `cargo run -p nautilus-kraken --features examples --example kraken-hurst-vpin-backtest --release`
[[example]]
name = "kraken-hurst-vpin-backtest"
path = "examples/engine_hurst_vpin_backtest.rs"
required-features = ["examples"]
doc = false

# Run with `cargo run -p nautilus-kraken --features examples --example kraken-hurst-vpin-live`
[[example]]
name = "kraken-hurst-vpin-live"
path = "examples/node_hurst_vpin_live.rs"
required-features = ["examples"]
doc = false
