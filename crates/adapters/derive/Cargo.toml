[package]
name = "nautilus-derive"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Derive integration adapter for the Nautilus trading engine"
categories.workspace = true
keywords.workspace = true
documentation.workspace = true
repository.workspace = true
homepage.workspace = true
publish = false # Do not publish to crates.io yet

[lints]
workspace = true

[lib]
name = "nautilus_derive"
crate-type = ["rlib"]

[features]
default = ["high-precision"]
examples = [
  "nautilus-live/node",
  "nautilus-network/transport-sockudo",
  "nautilus-trading/examples",
]
extension-module = [
  "nautilus-common/extension-module",
  "nautilus-core/extension-module",
  "nautilus-model/extension-module",
  "nautilus-network/extension-module",
  "pyo3/extension-module",
  "python",
]
python = [
  "dep:nautilus-system",
  "nautilus-common/python",
  "nautilus-core/python",
  "nautilus-model/python",
  "nautilus-network/python",
  "nautilus-system/python",
  "pyo3",
  "pyo3-stub-gen",
]
high-precision = ["nautilus-model/high-precision"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
nautilus-common = { workspace = true, features = ["live"] }
nautilus-core = { workspace = true }
nautilus-live = { workspace = true }
nautilus-model = { workspace = true }
nautilus-network = { workspace = true }
nautilus-system = { workspace = true, optional = true }

ahash = { workspace = true }
alloy = { workspace = true }
alloy-primitives = { workspace = true }
anyhow = { workspace = true }
arc-swap = { workspace = true }
async-trait = { workspace = true }
bon = { workspace = true }
chrono = { workspace = true }
dashmap = { workspace = true }
futures-util = { workspace = true }
log = { workspace = true }
rust_decimal = { workspace = true }
rust_decimal_macros = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-tungstenite = { workspace = true }
tokio-util = { workspace = true }
ustr = { workspace = true }
zeroize = { workspace = true }

pyo3 = { workspace = true, optional = true }
pyo3-stub-gen = { workspace = true, optional = true }

[dev-dependencies]
nautilus-testkit = { workspace = true }
nautilus-trading = { workspace = true }

axum = { workspace = true }
bytes = { workspace = true }
dotenvy = { workspace = true }
rstest = { workspace = true }

# Run with `cargo run --bin derive-flatten -p nautilus-derive`.
[[bin]]
name = "derive-flatten"
path = "bin/flatten.rs"
doc = false
test = false

# Phase 0 venue research probe. Submits and cancels a far-from-spread spot
# limit order on testnet. Run with `cargo run -p nautilus-derive --bin derive-spot-research`.
[[bin]]
name = "derive-spot-research"
path = "bin/spot_research.rs"
doc = false
test = false

# Run with `cargo run --example derive-data-tester --package nautilus-derive --features examples`.
[[example]]
name = "derive-data-tester"
path = "examples/node_data_tester.rs"
required-features = ["examples"]
doc = false

# Run with `cargo run --example derive-exec-tester --package nautilus-derive --features examples`.
[[example]]
name = "derive-exec-tester"
path = "examples/node_exec_tester.rs"
required-features = ["examples"]
doc = false

# Run with `cargo run --example derive-delta-neutral --package nautilus-derive --features examples`.
[[example]]
name = "derive-delta-neutral"
path = "examples/node_delta_neutral.rs"
required-features = ["examples"]
doc = false
