[package]
name = "nautilus-betfair"
readme = "README.md"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Betfair exchange integration adapter for the Nautilus trading engine"
categories.workspace = true
keywords.workspace = true
documentation.workspace = true
repository.workspace = true
homepage.workspace = true

[lints]
workspace = true

[lib]
name = "nautilus_betfair"
crate-type = ["rlib"]

[features]
examples = ["nautilus-live/node", "nautilus-trading/examples"]
high-precision = ["nautilus-model/high-precision"]
python = [
  "dep:nautilus-system",
  "nautilus-core/python",
  "nautilus-live/python",
  "nautilus-model/python",
  "nautilus-system/python",
  "pyo3",
  "pyo3-stub-gen",
]

[package.metadata.docs.rs]
features = ["high-precision"]
rustdoc-args = ["--cfg", "docsrs"]

[package.metadata.cargo-machete]
ignored = ["arrow"] # Used by `custom_data` macro expansion

[dependencies]
nautilus-common = { workspace = true, features = ["live"] }
nautilus-core = { workspace = true }
nautilus-live = { workspace = true }
nautilus-model = { workspace = true }
nautilus-network = { workspace = true }
nautilus-persistence-macros = { workspace = true }
nautilus-serialization = { workspace = true, features = ["arrow"] }
nautilus-system = { workspace = true, optional = true }

ahash = { workspace = true }
anyhow = { workspace = true }
arrow = { workspace = true } # Used by `custom_data` macro expansion (cargo-machete false positive)
async-trait = { workspace = true }
bon = { workspace = true }
bytes = { workspace = true }
bzip2 = { workspace = true }
chrono = { workspace = true }
flate2 = { workspace = true }
log = { workspace = true }
rust_decimal = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-tungstenite = { workspace = true }
tokio-util = { workspace = true }
ustr = { workspace = true }
zeroize = { workspace = true }

pyo3 = { workspace = true, optional = true }
pyo3-stub-gen = { workspace = true, optional = true }

[dev-dependencies]
nautilus-backtest = { workspace = true }
nautilus-execution = { workspace = true }
nautilus-testkit = { workspace = true }
nautilus-trading = { workspace = true }

axum = { workspace = true }
dotenvy = { workspace = true }
rstest = { workspace = true }
tokio = { workspace = true, features = ["full"] }

# Run with `cargo run -p nautilus-betfair --example betfair-data-tester --features examples`
[[example]]
name = "betfair-data-tester"
path = "examples/node_data_tester.rs"
required-features = ["examples"]
doc = false

# Run with `cargo run -p nautilus-betfair --example betfair-exec-tester --features examples`
[[example]]
name = "betfair-exec-tester"
path = "examples/node_exec_tester.rs"
required-features = ["examples"]
doc = false

# Run with `cargo run -p nautilus-betfair --example betfair-load-file`
[[example]]
name = "betfair-load-file"
path = "examples/load_betfair_file.rs"
doc = false

# Run with `cargo run -p nautilus-betfair --features examples --example betfair-backtest`
[[example]]
name = "betfair-backtest"
path = "examples/betfair_backtest.rs"
required-features = ["examples"]
doc = false
