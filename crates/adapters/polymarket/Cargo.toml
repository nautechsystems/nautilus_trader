[package]
name = "nautilus-polymarket"
readme = "README.md"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Polymarket integration adapter for the Nautilus trading engine"
categories.workspace = true
keywords.workspace = true
documentation.workspace = true
repository.workspace = true
homepage.workspace = true

[lints]
workspace = true

[lib]
name = "nautilus_polymarket"
crate-type = ["rlib"]

[features]
default = ["high-precision"]
examples = ["nautilus-live/node", "nautilus-network/transport-sockudo"]
extension-module = [
  "nautilus-common/extension-module",
  "nautilus-core/extension-module",
  "nautilus-live/extension-module",
  "nautilus-model/extension-module",
  "nautilus-network/extension-module",
  "pyo3/extension-module",
  "python",
]
python = [
  "dep:nautilus-system",
  "nautilus-common/python",
  "nautilus-core/python",
  "nautilus-live/python",
  "nautilus-model/python",
  "nautilus-network/python",
  "nautilus-system/python",
  "pyo3",
  "pyo3-stub-gen",
]
high-precision = ["nautilus-model/high-precision"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
nautilus-common = { workspace = true, features = ["live"] }
nautilus-core = { workspace = true }
nautilus-live = { workspace = true }
nautilus-model = { workspace = true }
nautilus-network = { workspace = true }
nautilus-system = { workspace = true, optional = true }

ahash = { workspace = true }
alloy = { workspace = true, features = ["provider-http", "network", "reqwest"] }
alloy-primitives = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
aws-lc-rs = { workspace = true }
base64 = { workspace = true }
bon = { workspace = true }
chrono = { workspace = true }
dashmap = { workspace = true }
derive_builder = { workspace = true }
dotenvy = { workspace = true }
futures-util = { workspace = true }
log = { workspace = true }
rust_decimal = { workspace = true }
rust_decimal_macros = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_repr = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-tungstenite = { workspace = true }
tokio-util = { workspace = true }
url = { workspace = true }
ustr = { workspace = true }
uuid = { workspace = true }
zeroize = { workspace = true }

pyo3 = { workspace = true, optional = true }
pyo3-stub-gen = { workspace = true, optional = true }

[dev-dependencies]
nautilus-testkit = { workspace = true }
nautilus-trading = { workspace = true }

axum = { workspace = true }
proptest = { workspace = true }
rstest = { workspace = true }

[[bin]]
name = "polymarket-updown-markets"
path = "bin/updown_markets.rs"
doc = false
test = false

[[bin]]
name = "polymarket-trending-markets"
path = "bin/trending_markets.rs"
doc = false
test = false

[[bin]]
name = "polymarket-composite-filter"
path = "bin/composite_filter.rs"
doc = false
test = false

[[bin]]
name = "polymarket-search-markets"
path = "bin/search_markets.rs"
doc = false
test = false

[[bin]]
name = "polymarket-event-discovery"
path = "bin/event_discovery.rs"
doc = false
test = false

[[bin]]
name = "polymarket-create-api-key"
path = "bin/create_api_key.rs"
doc = false
test = false

[[example]]
name = "polymarket-data-tester"
path = "examples/node_data_tester.rs"
required-features = ["examples"]
doc = false

[[example]]
name = "polymarket-election-subscriber"
path = "examples/election_trade_subscriber.rs"
required-features = ["examples"]
doc = false

[[example]]
name = "polymarket-exec-tester"
path = "examples/node_exec_tester.rs"
required-features = ["examples"]
doc = false

[[example]]
name = "polymarket-new-market-monitor"
path = "examples/new_market_monitor.rs"
required-features = ["examples"]
doc = false
