[package]
name = "nautilus-tardis"
readme = "README.md"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Tardis integration adapter for the Nautilus trading engine"
categories.workspace = true
keywords.workspace = true
documentation.workspace = true
repository.workspace = true
homepage.workspace = true

[lints]
workspace = true

[lib]
name = "nautilus_tardis"
crate-type = ["rlib"]

[features]
default = ["replay", "high-precision"]
examples = ["nautilus-live/node"]
extension-module = [
  "nautilus-common/extension-module",
  "nautilus-core/extension-module",
  "nautilus-live/extension-module",
  "nautilus-model/extension-module",
  "nautilus-serialization/extension-module",
  "pyo3/extension-module",
  "python",
  "replay",
]
python = [
  "dep:nautilus-system",
  "nautilus-common/python",
  "nautilus-core/python",
  "nautilus-live/python",
  "nautilus-model/python",
  "nautilus-serialization/python",
  "nautilus-system/python",
  "pyo3",
  "pyo3-async-runtimes",
  "pyo3-stub-gen",
  "replay",
]
replay = []
high-precision = ["nautilus-model/high-precision"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
nautilus-common = { workspace = true, features = ["live"] }
nautilus-core = { workspace = true }
nautilus-model = { workspace = true, features = ["python"] }
nautilus-network = { workspace = true }
nautilus-serialization = { workspace = true, features = ["arrow"] }
nautilus-system = { workspace = true, optional = true }

ahash = { workspace = true }
anyhow = { workspace = true }
arrow = { workspace = true }
async-stream = { workspace = true }
async-trait = { workspace = true }
bon = { workspace = true }
chrono = { workspace = true }
csv = { workspace = true }
derive_builder = { workspace = true }
flate2 = { workspace = true }
futures-util = { workspace = true }
log = { workspace = true }
parquet = { workspace = true, features = ["snap", "zstd"] }
rust_decimal = { workspace = true }
rust_decimal_macros = { workspace = true }
ryu = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-tungstenite = { workspace = true }
tokio-util = { workspace = true }
ustr = { workspace = true }
zeroize = { workspace = true }

pyo3 = { workspace = true, optional = true }
pyo3-async-runtimes = { workspace = true, optional = true }
pyo3-stub-gen = { workspace = true, optional = true }

[dev-dependencies]
axum = { workspace = true }
dotenvy = { workspace = true }
nautilus-live = { workspace = true }
nautilus-testkit = { workspace = true }
rstest = { workspace = true }

[[bin]]
name = "tardis-csv"
path = "bin/example_csv.rs"
doc = false
test = false

[[bin]]
name = "tardis-http"
path = "bin/example_http.rs"
doc = false
test = false

[[bin]]
name = "tardis-replay"
path = "bin/example_replay.rs"
required-features = ["replay"]
doc = false
test = false

# Run with `cargo run --bin stream_deltas_bench --profile bench`
[[bin]]
name = "stream_deltas_bench"
path = "bin/stream_deltas_bench.rs"
doc = false
test = false

# Run with `cargo run --example tardis-data-tester -p nautilus-tardis --features examples`
[[example]]
name = "tardis-data-tester"
path = "examples/node_data_tester.rs"
required-features = ["examples"]
doc = false
