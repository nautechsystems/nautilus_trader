[package]
name = "nautilus-architect-ax"
readme = "README.md"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "AX Exchange integration adapter for the Nautilus trading engine"
categories.workspace = true
keywords.workspace = true
documentation.workspace = true
repository.workspace = true
homepage.workspace = true

[lints]
workspace = true

[lib]
name = "nautilus_architect_ax"
crate-type = ["rlib"]

[features]
default = []
examples = ["nautilus-live/node", "nautilus-network/transport-sockudo"]
python = [
  "dep:nautilus-system",
  "nautilus-common/python",
  "nautilus-core/python",
  "nautilus-live/python",
  "nautilus-model/python",
  "nautilus-network/python",
  "nautilus-system/python",
  "pyo3",
  "pyo3-async-runtimes",
  "pyo3-stub-gen",
]
extension-module = [
  "nautilus-common/extension-module",
  "nautilus-core/extension-module",
  "nautilus-live/extension-module",
  "nautilus-model/extension-module",
  "nautilus-network/extension-module",
  "pyo3/extension-module",
  "python",
]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
nautilus-common = { workspace = true, features = ["live"] }
nautilus-core = { workspace = true }
nautilus-live = { workspace = true }
nautilus-model = { workspace = true }
nautilus-network = { workspace = true }
nautilus-system = { workspace = true, optional = true }

ahash = { workspace = true }
anyhow = { workspace = true }
arc-swap = { workspace = true }
async-stream = { workspace = true }
async-trait = { workspace = true }
bon = { workspace = true }
chrono = { workspace = true }
dashmap = { workspace = true }
dotenvy = { workspace = true }
futures-util = { workspace = true }
itoa = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true }
rust_decimal = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_urlencoded = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-tungstenite = { workspace = true }
tokio-util = { workspace = true }
ustr = { workspace = true }
zeroize = { workspace = true }

pyo3 = { workspace = true, optional = true }
pyo3-async-runtimes = { workspace = true, optional = true }
pyo3-stub-gen = { workspace = true, optional = true }

[dev-dependencies]
nautilus-testkit = { workspace = true }
nautilus-trading = { workspace = true }

axum = { workspace = true }
criterion = { workspace = true }
rstest = { workspace = true }
rust_decimal_macros = { workspace = true }

# cargo bench -p nautilus-architect-ax --bench deserialization
[[bench]]
name = "deserialization"
path = "benches/deserialization.rs"
harness = false

# cargo bench -p nautilus-architect-ax --bench parsing
[[bench]]
name = "parsing"
path = "benches/parsing.rs"
harness = false

# cargo run -p nautilus-architect-ax --bin ax-http-public
[[bin]]
name = "ax-http-public"
path = "bin/http_public.rs"
doc = false
test = false

# cargo run -p nautilus-architect-ax --bin ax-ws-data
[[bin]]
name = "ax-ws-data"
path = "bin/ws_data.rs"
doc = false
test = false

# cargo run -p nautilus-architect-ax --bin ax-ws-orders
[[bin]]
name = "ax-ws-orders"
path = "bin/ws_orders.rs"
doc = false
test = false

# cargo run -p nautilus-architect-ax --bin ax-flatten
[[bin]]
name = "ax-flatten"
path = "bin/flatten.rs"
doc = false
test = false

# cargo run --example ax-data-tester -p nautilus-architect-ax --features examples
[[example]]
name = "ax-data-tester"
path = "examples/node_data_tester.rs"
required-features = ["examples"]
doc = false

# cargo run --example ax-exec-tester -p nautilus-architect-ax --features examples
[[example]]
name = "ax-exec-tester"
path = "examples/node_exec_tester.rs"
required-features = ["examples"]
doc = false
