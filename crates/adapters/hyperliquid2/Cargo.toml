[package]
name = "nautilus-hyperliquid2"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Nautilus Trader integration adapter for Hyperliquid"
documentation.workspace = true

[lib]
name = "nautilus_hyperliquid2"
crate-type = ["rlib", "cdylib"]

# Example binaries
[[bin]]
name = "hyperliquid2-http"
path = "bin/http.rs"

[[bin]]
name = "hyperliquid2-ws"
path = "bin/ws.rs"

[dependencies]
anyhow = { workspace = true }
futures-util = { workspace = true }
nautilus-core = { workspace = true }
nautilus-model = { workspace = true }
nautilus-network = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
rust_decimal = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tokio-tungstenite = { workspace = true, features = ["native-tls"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
url = { workspace = true }
ustr = { workspace = true }
zeroize = { workspace = true }

# Cryptography for signature (Hyperliquid uses eth-style signing)
ethers = { version = "2.0", features = ["abigen"] }
hex = "0.4"

# Optional Python bindings
pyo3 = { workspace = true, optional = true }
pyo3-async-runtimes = { workspace = true, optional = true }

[dev-dependencies]
tracing-subscriber = { workspace = true, features = ["fmt"] }

[features]
default = []
python = ["pyo3", "pyo3-async-runtimes", "nautilus-core/python", "nautilus-model/python"]
extension-module = ["python", "pyo3/extension-module"]
