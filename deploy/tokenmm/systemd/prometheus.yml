global:
  scrape_interval: 5s
  scrape_timeout: 4s

scrape_configs:
  - job_name: tokenmm_liquidity_exporter
    static_configs:
      - targets: ["127.0.0.1:9108"]
        labels:
          service: tokenmm
          environment: production

  - job_name: tokenmm_markouts_exporter
    static_configs:
      - targets: ["127.0.0.1:9109"]
        labels:
          service: tokenmm
          environment: production

  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]
