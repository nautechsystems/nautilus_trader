[flux]
mode = "live"
confirm_live = true
namespace = "flux"
schema_version = "v1"

[identity]
strategy_id = "plumeusdt_okx_perp_makerv3"
strategy_instance_id = "plumeusdt_okx_perp_makerv3"
trader_id = "TOKENMM-LIVE-OKX-PERP"
external_strategy_id = "plumeusdt_okx_perp_makerv3"

[venues]
execution_venue = "OKX"
reference_venue = "BINANCE_SPOT"
execution_symbol = "PLUME-USDT-SWAP"
reference_symbol = "PLUMEUSDT"

[node]
enable_execution = true
log_level = "INFO"
timeout_connection = 20.0
timeout_reconciliation = 30.0
timeout_portfolio = 10.0
timeout_disconnection = 10.0
timeout_post_stop = 5.0
exec_reconciliation = true
exec_generate_missing_orders = true
# Extended startup history for prolonged-downtime recovery; startup reconciliation
# is instrument-scoped for single-client TokenMM nodes.
exec_reconciliation_lookback_mins = 1440
exec_reconciliation_startup_delay_secs = 10.0
filter_unclaimed_external_orders = true
filter_position_reports = false
purge_closed_orders_interval_mins = 10
purge_closed_orders_buffer_mins = 15
purge_closed_positions_interval_mins = 10
purge_closed_positions_buffer_mins = 15
purge_account_events_interval_mins = 10
purge_account_events_lookback_mins = 15
purge_from_database = true

[node.venues.OKX]
adapter = "okx"
instrument_id = "PLUME-USDT-SWAP.OKX"
execution = true
api_key_env = "OKX_API_KEY"
api_secret_env = "OKX_API_SECRET"
api_passphrase_env = "OKX_API_PASSPHRASE"
instrument_type = "SWAP"
contract_type = "LINEAR"
margin_mode = "CROSS"
is_demo = false

[node.venues.BINANCE_SPOT]
adapter = "binance"
instrument_id = "PLUMEUSDT.BINANCE_SPOT"
api_key_env = "BINANCE_API_KEY"
api_secret_env = "BINANCE_API_SECRET"
account_type = "SPOT"

[strategy]
strategy_id = "plumeusdt_okx_perp_makerv3"
manage_stop = false
force_bot_off_on_start = false
order_qty = "1000"
qty = "1000"
qty_unit = "base"
bot_on = true
max_age_ms = 10000
max_cancels_per_side_per_cycle = 2
max_places_per_side_per_cycle = 2
max_total_actions_per_cycle = 6
max_pending_cancels_per_side = 2
des_qty_global = 0.0
max_qty_global = 50000.0
max_skew_bps_global = 10.0
des_qty_local = 0.0
max_qty_local = 250000.0
max_skew_bps_local = 10.0
linear_offset_bps = 0.0
bid_edge1 = 15.0
ask_edge1 = 15.0
place_edge1 = 2.0
distance1 = 5.0
n_orders1 = 5
bid_edge2 = 25.0
ask_edge2 = 25.0
place_edge2 = 2.0
distance2 = 5.0
n_orders2 = 0
bid_edge3 = 50.0
ask_edge3 = 50.0
place_edge3 = 2.0
distance3 = 5.0
n_orders3 = 0
order_reject_alert_after_count = 3
order_reject_alert_after_s = 60.0
quote_fail_critical_after_count = 3
quote_fail_critical_after_s = 60.0
