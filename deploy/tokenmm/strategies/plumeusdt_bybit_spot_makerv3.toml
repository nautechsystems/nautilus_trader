[flux]
mode = "live"
confirm_live = true
namespace = "flux"
schema_version = "v1"

[identity]
strategy_id = "plumeusdt_bybit_spot_makerv3"
strategy_instance_id = "plumeusdt_bybit_spot_makerv3"
trader_id = "TOKENMM-LIVE-BYBIT-SPOT"
