[flux]
mode = "live"
confirm_live = true
namespace = "flux"
schema_version = "v1"

[identity]
strategy_id = "bybit_linear_plumeusdt_makerv3_01"
strategy_instance_id = "bybit_linear_plumeusdt_makerv3_01"
trader_id = "MAKER-LIVE-001"
external_strategy_id = "bybit_linear_plumeusdt_makerv3_01"

[redis]
host = "127.0.0.1"
port = 6380
db = 0
username = ""
password = ""
connect_timeout_secs = 5.0
read_timeout_secs = 5.0

[venues]
execution_venue = "BYBIT"
reference_venue = "BINANCE"
execution_symbol = "PLUMEUSDT"
reference_symbol = "PLUMEUSDT"

[node]
enable_execution = false
log_level = "INFO"
timeout_connection = 20.0
timeout_reconciliation = 30.0
timeout_portfolio = 10.0
timeout_disconnection = 10.0
timeout_post_stop = 5.0
exec_reconciliation = true
# Shared-account persisted-cache startup guardrail:
# avoid full-history replay storms on busy venues.
exec_reconciliation_lookback_mins = 15
exec_reconciliation_startup_delay_secs = 10.0
filter_unclaimed_external_orders = true
filter_position_reports = true
# Optional cache persistence guardrail:
# cache_flush_on_start = false

[node.venues.BYBIT]
instrument_id = "PLUMEUSDT-LINEAR.BYBIT"
execution = true
api_key_env = "BYBIT_API_KEY"
api_secret_env = "BYBIT_API_SECRET"
product_type = "LINEAR"
# Live/demo guardrail: increase receive window to reduce startup reconciliation timestamp skew failures (Bybit 10002).
recv_window_ms = 20000
testnet = false
demo = false

[node.venues.BINANCE]
instrument_id = "PLUMEUSDT.BINANCE"
api_key_env = "BINANCE_API_KEY"
api_secret_env = "BINANCE_API_SECRET"
account_type = "SPOT"

[strategy]
strategy_id = "bybit_linear_plumeusdt_makerv3_01"
order_qty = "1000"
qty = "1000"
bot_on = false
max_age_ms = 10000
des_qty_global = 0.0
max_qty_global = 40000.0
max_skew_bps_global = 5.0
des_qty_local = 0.0
max_qty_local = 0.0
max_skew_bps_local = 0.0
linear_offset_bps = 0.0
bid_edge1 = 10.0
ask_edge1 = 10.0
place_edge1 = 2.0
distance1 = 2.0
n_orders1 = 5
bid_edge2 = 25.0
ask_edge2 = 25.0
place_edge2 = 2.0
distance2 = 5.0
n_orders2 = 0
bid_edge3 = 50.0
ask_edge3 = 50.0
place_edge3 = 2.0
distance3 = 5.0
n_orders3 = 0
quote_fail_critical_after_count = 3
quote_fail_critical_after_s = 60.0

[bridge]
log_level = "INFO"
scan_interval_sec = 3.0
block_ms = 1000
read_count = 200
start_id = "$"

[api]
host = "127.0.0.1"
port = 5022
strategy_class = "maker_v3"
strategy_groups = "tokenmm"
base_asset = "PLUME"
quote_asset = "USDT"
# Phase 1 TokenMM registry contract:
# - `tokenmm_strategy_ids` values are Flux strategy IDs (`[identity].strategy_id` in per-node configs).
# - `tokenmm_required_strategy_ids` are used for degraded/missing-required checks in API portfolio views.
# - Keep this list to the 5 PLUME MakerV3 instances only.
tokenmm_strategy_ids = [
  "bybit_linear_plumeusdt_makerv3_01",
  "bybit_linear_plumeusdt_makerv3_02",
  "bybit_linear_plumeusdt_makerv3_03",
  "bybit_linear_plumeusdt_makerv3_04",
  "bybit_linear_plumeusdt_makerv3_05",
]
tokenmm_required_strategy_ids = [
  "bybit_linear_plumeusdt_makerv3_01",
  "bybit_linear_plumeusdt_makerv3_02",
  "bybit_linear_plumeusdt_makerv3_03",
  "bybit_linear_plumeusdt_makerv3_04",
  "bybit_linear_plumeusdt_makerv3_05",
]

[portfolio]
portfolio_id = "tokenmm"
# Naming convention:
# - Flux strategy IDs: bybit_linear_plumeusdt_makerv3_01 .. bybit_linear_plumeusdt_makerv3_05
# - IDs encode the actual execution venue, product type, symbol, strategy family, and instance slot.
# - TokenMM strategy file names match Flux strategy IDs exactly.
# - Production deploy configs use descriptive Nautilus strategy IDs, not generic numeric tags.

[[contracts]]
exchange = "bybit"
symbol = "PLUMEUSDT"

[[contracts]]
exchange = "binance"
symbol = "PLUMEUSDT"
