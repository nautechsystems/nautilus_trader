[flux]
mode = "live"
confirm_live = true
namespace = "flux"
schema_version = "v1"

[identity]
strategy_id = "tokenmm_api"
strategy_instance_id = "tokenmm_api"
trader_id = "TOKENMM-API-001"
external_strategy_id = "tokenmm_api"

[redis]
host = "master.tokenmm.wapqos.apse1.cache.amazonaws.com"
port = 6379
db = 0
username = "default"
password = ""
ssl = true
connect_timeout_secs = 5.0
read_timeout_secs = 5.0

[venues]
execution_venue = "BYBIT"
reference_venue = "BINANCE_SPOT"
execution_symbol = "PLUMEUSDT"
reference_symbol = "PLUMEUSDT"

[node]
enable_execution = false
log_level = "INFO"
timeout_connection = 20.0
timeout_reconciliation = 30.0
timeout_portfolio = 10.0
timeout_disconnection = 10.0
timeout_post_stop = 5.0
exec_reconciliation = true
exec_generate_missing_orders = false
# Shared-account persisted-cache startup guardrail:
# live execution-enabled TokenMM nodes must keep reconciliation on and must not
# filter maker position reports; avoid full-history replay storms on busy venues.
exec_reconciliation_lookback_mins = 15
exec_reconciliation_startup_delay_secs = 10.0
filter_unclaimed_external_orders = true
# enforced guardrail for live execution-enabled nodes:
filter_position_reports = false
# Optional cache persistence guardrail:
# cache_flush_on_start = false

[node.venues.BYBIT]
instrument_id = "PLUMEUSDT-LINEAR.BYBIT"
execution = true
api_key_env = "BYBIT_API_KEY"
api_secret_env = "BYBIT_API_SECRET"
product_type = "LINEAR"
# Live/demo guardrail: increase receive window to reduce startup reconciliation timestamp skew failures (Bybit 10002).
recv_window_ms = 20000
testnet = false
demo = false

[node.venues.BINANCE_SPOT]
adapter = "binance"
instrument_id = "PLUMEUSDT.BINANCE_SPOT"
api_key_env = "BINANCE_API_KEY"
api_secret_env = "BINANCE_API_SECRET"
account_type = "MARGIN"

[strategy]
strategy_id = "tokenmm_api"
order_qty = "1000"
qty = "1000"
qty_unit = "base"
bot_on = false
max_age_ms = 10000
des_qty_global = 0.0
max_qty_global = 50000.0
max_skew_bps_global = 10.0
des_qty_local = 0.0
max_qty_local = 0.0
max_skew_bps_local = 0.0
linear_offset_bps = 0.0
bid_edge1 = 10.0
ask_edge1 = 10.0
place_edge1 = 2.0
distance1 = 2.0
n_orders1 = 5
bid_edge2 = 25.0
ask_edge2 = 25.0
place_edge2 = 2.0
distance2 = 5.0
n_orders2 = 0
bid_edge3 = 50.0
ask_edge3 = 50.0
place_edge3 = 2.0
distance3 = 5.0
n_orders3 = 0
order_reject_alert_after_count = 3
order_reject_alert_after_s = 60.0
quote_fail_critical_after_count = 3
quote_fail_critical_after_s = 60.0

[bridge]
log_level = "INFO"
scan_interval_sec = 3.0
block_ms = 1000
read_count = 200
start_id = "$"

[api]
host = "127.0.0.1"
port = 5022
strategy_class = "maker_v3"
strategy_groups = "tokenmm"
base_asset = "PLUME"
quote_asset = "USDT"
# Production TokenMM registry contract:
# - `tokenmm_strategy_ids` values are Flux strategy IDs (`[identity].strategy_id` in per-node configs).
# - `tokenmm_required_strategy_ids` are the contributors currently required for
#   shared TokenMM portfolio completeness.
# - Keep `tokenmm_strategy_ids` and `tokenmm_required_strategy_ids` aligned to
#   the full 7-node live production set.
tokenmm_strategy_ids = [
  "plumeusdt_bybit_perp_makerv3",
  "plumeusdt_bybit_spot_makerv3",
  "plumeusdt_okx_perp_makerv3",
  "plumeusdt_binance_perp_makerv3",
  "plumeusdt_binance_spot_makerv3",
  "plumeusdt_bitget_perp_makerv3",
  "plumeusdt_bitget_spot_makerv3",
]
tokenmm_required_strategy_ids = [
  "plumeusdt_bybit_perp_makerv3",
  "plumeusdt_bybit_spot_makerv3",
  "plumeusdt_okx_perp_makerv3",
  "plumeusdt_binance_perp_makerv3",
  "plumeusdt_binance_spot_makerv3",
  "plumeusdt_bitget_perp_makerv3",
  "plumeusdt_bitget_spot_makerv3",
]

[controller]
controller_scope_id = "tokenmm.binance.pm.main"
account_scope_id = "binance.pm.main"
mode = "active"
write_ownership_enabled = true
lease_ttl_ms = 15000
managed_strategy_ids = [
  "plumeusdt_binance_perp_makerv3",
  "plumeusdt_binance_spot_makerv3",
]

[telemetry_shipper]
enabled = true
enable_local_persistence = true
source_profile = "tokenmm"
durable_sink = "postgres"
archive_s3_prefix = "nautilus/telemetry/tokenmm"
athena_database = "nautilus_telemetry"
athena_workgroup = "primary"
raw_quote_cycles_enabled = true
raw_quote_cycle_local_hours = 48
raw_quote_cycle_s3_days = 7
core_history_s3_days = 365
structured_local_cap_gb = 8
quote_cycle_local_cap_gb = 12
fills_db_path = "/var/lib/nautilus/telemetry/tokenmm/fills.sqlite"
orders_db_path = "/var/lib/nautilus/telemetry/tokenmm/orders.sqlite"
quote_cycles_db_path = "/var/lib/nautilus/telemetry/tokenmm/quote_cycles.sqlite"
markouts_db_path = "/var/lib/nautilus/telemetry/tokenmm/markouts.sqlite"
balance_snapshots_db_path = "/var/lib/nautilus/telemetry/tokenmm/balance_snapshots.sqlite"
portfolio_inventory_db_path = "/var/lib/nautilus/telemetry/tokenmm/portfolio_inventory.sqlite"
state_db_path = "/var/lib/nautilus/telemetry/tokenmm/shipper_state.sqlite"
poll_interval_ms = 1000
max_batch_size = 500
prune_retention_hours = 48
markout_horizons_s = [0, 30, 60, 120]
[[telemetry_shipper.markout_benchmarks]]
benchmark_name = "fv_market_mid"
benchmark_field = "fv"

[[telemetry_shipper.markout_benchmarks]]
benchmark_name = "local_mkt_mid"
benchmark_field = "maker_mid"

[portfolio]
portfolio_id = "tokenmm"
inventory_stale_after_ms = 3000
inventory_aggregation_mode = "partial"
allow_partial_global_risk = true
# Naming convention:
# - Flux strategy IDs: plumeusdt_<venue>_<product>_makerv3
# - Reference pricing stays on Binance spot via the `BINANCE_SPOT` venue alias.
# - TokenMM strategy file names match Flux strategy IDs exactly.
# - Production deploy configs use descriptive Nautilus strategy IDs, not generic numeric tags.
# Shared portfolio policy:
# - `run_portfolio` owns the canonical shared TokenMM portfolio snapshot.
# - `inventory_aggregation_mode = "partial"` keeps a usable `global_qty` from fresh contributors and
#   exposes incompleteness through metadata rather than nulling the quantity.
# - `allow_partial_global_risk = true` allows strategies to consume partial shared inventory intentionally.

