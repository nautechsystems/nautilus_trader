[flux]
mode = "live"
confirm_live = true
namespace = "flux"
schema_version = "v1"

[identity]
strategy_id = "equities_api"
strategy_instance_id = "equities_api"
trader_id = "EQUITIES-API-001"
external_strategy_id = "equities_api"

[redis]
host = "127.0.0.1"
port = 6379
db = 0
username = "default"
password = ""
ssl = false
connect_timeout_secs = 5.0
read_timeout_secs = 5.0

[venues]
execution_venue = "HYPERLIQUID"
reference_venue = "IBKR"
execution_symbol = "STOCKS"
reference_symbol = "STOCKS/USD"

[bridge]
log_level = "INFO"
scan_interval_sec = 3.0
block_ms = 1000
read_count = 200
start_id = "$"

[api]
# Stable equities API surface: keep `/equities` and `profile=equities`.
host = "0.0.0.0"
port = 5022
strategy_class = "maker_v3"
param_set = "makerv3"
strategy_groups = "equities"
base_asset = "STOCKS"
quote_asset = "USD"
equities_strategy_ids = [
  "aapl_tradexyz_makerv3",
  "amd_tradexyz_makerv3",
  "amzn_tradexyz_makerv3",
  "baba_tradexyz_makerv3",
  "coin_tradexyz_makerv3",
  "crcl_tradexyz_makerv3",
  "crwv_tradexyz_makerv3",
  "googl_tradexyz_makerv3",
  "hood_tradexyz_makerv3",
  "hyundai_tradexyz_makerv3",
  "intc_tradexyz_makerv3",
  "meta_tradexyz_makerv3",
  "mstr_tradexyz_makerv3",
  "msft_tradexyz_makerv3",
  "mu_tradexyz_makerv3",
  "nflx_tradexyz_makerv3",
  "nvda_tradexyz_makerv3",
  "orcl_tradexyz_makerv3",
  "pltr_tradexyz_makerv3",
  "rivn_tradexyz_makerv3",
  "sndk_tradexyz_makerv3",
  "tsm_tradexyz_makerv3",
  "tsla_tradexyz_makerv3",
  "usar_tradexyz_makerv3",
]
equities_required_strategy_ids = [
  "aapl_tradexyz_makerv3",
  "amd_tradexyz_makerv3",
  "amzn_tradexyz_makerv3",
  "baba_tradexyz_makerv3",
  "coin_tradexyz_makerv3",
  "crcl_tradexyz_makerv3",
  "crwv_tradexyz_makerv3",
  "googl_tradexyz_makerv3",
  "hood_tradexyz_makerv3",
  "hyundai_tradexyz_makerv3",
  "intc_tradexyz_makerv3",
  "meta_tradexyz_makerv3",
  "mstr_tradexyz_makerv3",
  "msft_tradexyz_makerv3",
  "mu_tradexyz_makerv3",
  "nflx_tradexyz_makerv3",
  "nvda_tradexyz_makerv3",
  "orcl_tradexyz_makerv3",
  "pltr_tradexyz_makerv3",
  "rivn_tradexyz_makerv3",
  "sndk_tradexyz_makerv3",
  "tsm_tradexyz_makerv3",
  "tsla_tradexyz_makerv3",
  "usar_tradexyz_makerv3",
]

[portfolio]
# Stable portfolio identity for the equities rollout.
portfolio_id = "equities"
inventory_stale_after_ms = 3000

[[account_scopes]]
scope_id = "hyperliquid.xyz.main"
provider = "hyperliquid"
venue = "HYPERLIQUID"

[[account_scopes]]
scope_id = "ibkr.reference.main"
provider = "ibkr"
venue = "IBKR"
ibg_host = "127.0.0.1"
ibg_port = 4002
ibg_client_id = 107

[account_scopes.dockerized_gateway]
trading_mode = "live"
read_only_api = true
manage_container = true
auto_restart_time = "11:45 PM"
time_zone = "America/New_York"
relogin_after_twofa_timeout = false
twofa_timeout_action = "exit"

[[account_scopes]]
scope_id = "ibkr.hedge.main"
provider = "ibkr"
venue = "IBKR"
ibg_host = "127.0.0.1"
ibg_port = 4002
ibg_client_id = 108

[account_scopes.dockerized_gateway]
trading_mode = "live"
read_only_api = true
manage_container = false

