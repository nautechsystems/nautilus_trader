[flux]
mode = "live"
confirm_live = true
namespace = "flux"
schema_version = "v1"

[identity]
strategy_id = "equities_api"
strategy_instance_id = "equities_api"
trader_id = "EQUITIES-API-001"
external_strategy_id = "equities_api"

[redis]
host = "127.0.0.1"
port = 6379
db = 0
username = "default"
password = ""
ssl = false
connect_timeout_secs = 5.0
read_timeout_secs = 5.0

[venues]
execution_venue = "HYPERLIQUID"
reference_venue = "IBKR"
execution_symbol = "STOCKS"
reference_symbol = "STOCKS/USD"

[bridge]
log_level = "INFO"
scan_interval_sec = 3.0
block_ms = 1000
read_count = 200
start_id = "$"

[ibkr_reference_publisher]
enabled = true
profile_id = "equities"
account_scope_id = "ibkr.reference.main"
service_id = "ibkr_reference_publisher"
