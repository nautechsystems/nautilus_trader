[flux]
mode = "live"
confirm_live = true
namespace = "flux"
schema_version = "v1"

[identity]
strategy_id = "equities_api"
strategy_instance_id = "equities_api"
trader_id = "EQUITIES-API-001"
external_strategy_id = "equities_api"

[redis]
host = "127.0.0.1"
port = 6379
db = 0
username = "default"
password = ""
ssl = false
connect_timeout_secs = 5.0
read_timeout_secs = 5.0

[venues]
execution_venue = "HYPERLIQUID"
reference_venue = "IBKR"
execution_symbol = "AAPL"
reference_symbol = "AAPL/USD"

[node]
enable_execution = false
log_level = "INFO"
timeout_connection = 20.0
timeout_reconciliation = 30.0
timeout_portfolio = 10.0
timeout_disconnection = 10.0
timeout_post_stop = 5.0
exec_reconciliation = true
exec_reconciliation_lookback_mins = 15
exec_reconciliation_startup_delay_secs = 10.0
filter_unclaimed_external_orders = true
filter_position_reports = false

[node.venues.HYPERLIQUID]
instrument_id = "xyz:AAPL-USD-PERP.HYPERLIQUID"
execution = true
private_key_env = "TRADE_XYZ_AGENT_PK"
account_address_env = "TRADE_XYZ_ACCOUNT_ADDRESS"
dex = "xyz"
testnet = false

[node.venues.IBKR]
adapter = "interactive_brokers"
instrument_id = "AAPL.NASDAQ"
ibg_client_id = 7
execution = false

[node.venues.IBKR.dockerized_gateway]
trading_mode = "live"
read_only_api = true
auto_restart_time = "11:45 PM"
time_zone = "America/New_York"
relogin_after_twofa_timeout = true

[strategy]
strategy_id = "equities_api"
order_qty = "100"
qty = "100"
bot_on = false
max_age_ms = 10000
des_qty_global = 0.0
max_qty_global = 1000.0
max_skew_bps_global = 10.0
des_qty_local = 0.0
max_qty_local = 0.0
max_skew_bps_local = 0.0
linear_offset_bps = 0.0
bid_edge1 = 10.0
ask_edge1 = 10.0
place_edge1 = 2.0
distance1 = 2.0
n_orders1 = 5
quote_fail_critical_after_count = 3
quote_fail_critical_after_s = 60.0

[bridge]
log_level = "INFO"
scan_interval_sec = 3.0
block_ms = 1000
read_count = 200
start_id = "$"

[api]
# Stable equities API surface: keep `/equities` and `profile=equities`.
host = "0.0.0.0"
port = 5022
strategy_class = "maker_v3"
strategy_groups = "equities"
base_asset = "AAPL"
quote_asset = "USD"
equities_strategy_ids = [
  "aapl_tradexyz_makerv3",
]
equities_required_strategy_ids = [
  "aapl_tradexyz_makerv3",
]

[portfolio]
# Stable portfolio identity for the equities rollout.
portfolio_id = "equities"
inventory_stale_after_ms = 3000

[[contracts]]
exchange = "ibkr"
symbol = "AAPL/USD"
instrument_id = "AAPL.NASDAQ"
