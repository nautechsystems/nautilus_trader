[flux]
mode = "live"
confirm_live = true
namespace = "flux"
schema_version = "v1"

[identity]
strategy_id = "equities_api"
strategy_instance_id = "equities_api"
trader_id = "EQUITIES-API-001"
external_strategy_id = "equities_api"

[redis]
host = "127.0.0.1"
port = 6379
db = 0
username = "default"
password = ""
ssl = false
connect_timeout_secs = 5.0
read_timeout_secs = 5.0

[venues]
execution_venue = "HYPERLIQUID"
reference_venue = "IBKR"
execution_symbol = "STOCKS"
reference_symbol = "STOCKS/USD"

[bridge]
log_level = "INFO"
scan_interval_sec = 3.0
block_ms = 1000
read_count = 200
start_id = "$"

[api]
host = "0.0.0.0"
port = 5022
strategy_class = "equities_maker"
param_set = "equities_maker"
strategy_groups = "equities"
base_asset = "STOCKS"
quote_asset = "USD"
equities_strategy_ids = [
  "aapl_tradexyz_maker",
  "aapl_tradexyz_taker",
  "amd_tradexyz_maker",
  "amd_tradexyz_taker",
  "amzn_tradexyz_maker",
  "amzn_tradexyz_taker",
  "googl_tradexyz_maker",
  "googl_tradexyz_taker",
  "meta_tradexyz_maker",
  "meta_tradexyz_taker",
  "msft_tradexyz_maker",
  "msft_tradexyz_taker",
  "nvda_tradexyz_maker",
  "nvda_tradexyz_taker",
  "orcl_tradexyz_maker",
  "orcl_tradexyz_taker",
  "pltr_tradexyz_maker",
  "pltr_tradexyz_taker",
  "tsla_tradexyz_maker",
  "tsla_tradexyz_taker",
]
equities_required_strategy_ids = [
  "aapl_tradexyz_maker",
  "aapl_tradexyz_taker",
  "amd_tradexyz_maker",
  "amd_tradexyz_taker",
  "amzn_tradexyz_maker",
  "amzn_tradexyz_taker",
  "googl_tradexyz_maker",
  "googl_tradexyz_taker",
  "meta_tradexyz_maker",
  "meta_tradexyz_taker",
  "msft_tradexyz_maker",
  "msft_tradexyz_taker",
  "nvda_tradexyz_maker",
  "nvda_tradexyz_taker",
  "orcl_tradexyz_maker",
  "orcl_tradexyz_taker",
  "pltr_tradexyz_maker",
  "pltr_tradexyz_taker",
  "tsla_tradexyz_maker",
  "tsla_tradexyz_taker",
]

[portfolio]
portfolio_id = "equities"
inventory_stale_after_ms = 3000

[[account_scopes]]
scope_id = "hyperliquid.xyz.main"
provider = "hyperliquid"
venue = "HYPERLIQUID"
private_key_env = "TRADE_XYZ_AGENT_PK"
account_address_env = "TRADE_XYZ_ACCOUNT_ADDRESS"
vault_address_env = "TRADE_XYZ_VAULT_ADDRESS"
dex = "xyz"
testnet = false

[[account_scopes]]
scope_id = "binance.futures.main"
provider = "binance"
venue = "BINANCE_PERP"
api_key_env = "EQUITIES_BINANCE_API_KEY"
api_secret_env = "EQUITIES_BINANCE_API_SECRET"
account_type = "USDT_FUTURES"
private_api_family = "PORTFOLIO_MARGIN"
recv_window_ms = 5000

[[account_scopes]]
scope_id = "ibkr.reference.main"
provider = "ibkr"
venue = "IBKR"
ibg_host = "127.0.0.1"
ibg_port = 4002
ibg_client_id = 107
account_id = "U10015777"

[account_scopes.dockerized_gateway]
trading_mode = "live"
read_only_api = true
manage_container = true
auto_restart_time = "11:45 PM"
time_zone = "America/New_York"
relogin_after_twofa_timeout = false
twofa_timeout_action = "exit"

[[account_scopes]]
scope_id = "ibkr.hedge.main"
provider = "ibkr"
venue = "IBKR"
ibg_host = "127.0.0.1"
ibg_port = 4002
ibg_client_id = 208
account_id = "U10015777"

[account_scopes.dockerized_gateway]
trading_mode = "live"
read_only_api = true
manage_container = false

