name: common-test-data
description: Common test data caching

runs:
  using: "composite"
  steps:
    - name: Restore test data from cache
      # Skip on macOS: hashFiles() broken in composite actions after Nov 20 runner update
      # See: https://github.com/actions/runner/issues/3765
      if: runner.os != 'macOS'
      id: cached-testdata-large
      # https://github.com/actions/cache/tree/main/restore
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        # Cache only the large binary files. The tracked JSON manifests must
        # stay from the checked-out commit, otherwise restore-key fallbacks can
        # overwrite new checksums with stale cached manifests.
        path: |
          tests/test_data/large/*.csv
          tests/test_data/large/*.parquet
        key: large-files-v2-${{ hashFiles('tests/test_data/large/checksums.json') }}
        restore-keys: large-files-v2-
        enableCrossOsArchive: true

    - name: Save test data to cache
      # Skip on macOS: hashFiles() broken in composite actions after Nov 20 runner update
      # See: https://github.com/actions/runner/issues/3765
      if: ${{ runner.os != 'macOS' && always() && steps.cached-testdata-large.outputs.cache-hit != 'true' }}
      # https://github.com/actions/cache/tree/main/save
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          tests/test_data/large/*.csv
          tests/test_data/large/*.parquet
        key: large-files-v2-${{ hashFiles('tests/test_data/large/checksums.json') }}
        enableCrossOsArchive: true
