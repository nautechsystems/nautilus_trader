name: docs-features-check

# Documentation and feature compatibility checks - runs nightly and on-demand.
#
# Verifies docs.rs documentation builds and crate feature combinations compile correctly.

permissions:
  contents: read
  actions: read

on:
  push:
    branches: [test-docs-features]
  schedule:
    - cron: '0 12 * * *' # Daily at 12:00 UTC (same as security-audit)
  workflow_dispatch: # Allow manual trigger

jobs:
  docsrs-check:
    name: docsrs-check
    runs-on: ubuntu-22.04
    steps:
      - uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Get Rust toolchain version
        shell: bash
        run: echo "TOOLCHAIN=$(bash scripts/rust-toolchain.sh)" >> "$GITHUB_ENV"

      # https://github.com/actions-rust-lang/setup-rust-toolchain
      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c # v1.15.2
        with:
          toolchain: ${{ env.TOOLCHAIN }}
          override: true

      - name: Install Rust nightly
        run: rustup toolchain install nightly --profile minimal --component rustdoc

      # https://github.com/taiki-e/install-action
      - name: Install cargo-hack
        uses: taiki-e/install-action@59679e24ffb0dbbbc136684eda7fcd21fe9eddea # v2.63.0
        with:
          tool: cargo-hack

      - name: Run docsrs-check
        env:
          RUSTDOCFLAGS: "--cfg docsrs -D warnings"
        run: cargo +nightly hack --workspace doc --no-deps --all-features

  check-features:
    name: check-features
    runs-on: ubuntu-22.04
    steps:
      - uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Get Rust toolchain version
        shell: bash
        run: echo "TOOLCHAIN=$(bash scripts/rust-toolchain.sh)" >> "$GITHUB_ENV"

      # https://github.com/actions-rust-lang/setup-rust-toolchain
      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c # v1.15.2
        with:
          toolchain: ${{ env.TOOLCHAIN }}
          override: true

      # https://github.com/taiki-e/install-action
      - name: Install cargo-hack
        uses: taiki-e/install-action@59679e24ffb0dbbbc136684eda7fcd21fe9eddea # v2.63.0
        with:
          tool: cargo-hack

      - name: Run check-features
        run: cargo hack --workspace check --each-feature
