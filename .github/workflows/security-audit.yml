name: security-audit

# Supply chain security checks - runs nightly and on-demand for visibility.
#
# Separate from main build to avoid blocking PRs with unactionable advisories.

permissions:
  contents: read
  actions: read

on:
  push:
    branches: [test-security]
  schedule:
    - cron: '0 12 * * *' # Daily at 12:00 UTC (2hrs prior to nightly-merge)
  workflow_dispatch: # Allow manual trigger

jobs:
  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-22.04
    environment:
      name: >-
        ${{
          (github.ref_name == github.event.repository.default_branch ||
          github.ref_name == 'master') &&
          'security-audit' ||
          'security-audit-test'
        }}
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: ${{ vars.STEP_SECURITY_EGRESS_POLICY || 'block' }}
          allowed-endpoints: >-
            ${{ vars.COMMON_ALLOWED_ENDPOINTS }}
            ${{ vars.SECURITY_AUDIT_ALLOWED_ENDPOINTS }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install cargo-audit
        uses: ./.github/actions/cargo-tool-install
        with:
          tool-name: cargo-audit

      - name: Run cargo-audit
        run: cargo audit

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-22.04
    environment:
      name: >-
        ${{
          (github.ref_name == github.event.repository.default_branch ||
          github.ref_name == 'master') &&
          'security-audit' ||
          'security-audit-test'
        }}
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: ${{ vars.STEP_SECURITY_EGRESS_POLICY || 'block' }}
          allowed-endpoints: >-
            ${{ vars.COMMON_ALLOWED_ENDPOINTS }}
            ${{ vars.SECURITY_AUDIT_ALLOWED_ENDPOINTS }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install cargo-deny
        uses: ./.github/actions/cargo-tool-install
        with:
          tool-name: cargo-deny

      - name: Run cargo-deny (advisories, licenses, sources, bans)
        run: cargo deny --all-features check advisories licenses sources bans

  cargo-vet:
    name: cargo-vet
    runs-on: ubuntu-22.04
    environment:
      name: >-
        ${{
          (github.ref_name == github.event.repository.default_branch ||
          github.ref_name == 'master') &&
          'security-audit' ||
          'security-audit-test'
        }}
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: ${{ vars.STEP_SECURITY_EGRESS_POLICY || 'block' }}
          allowed-endpoints: >-
            ${{ vars.COMMON_ALLOWED_ENDPOINTS }}
            ${{ vars.SECURITY_AUDIT_ALLOWED_ENDPOINTS }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install cargo-vet
        uses: ./.github/actions/cargo-tool-install
        with:
          tool-name: cargo-vet

      - name: Run cargo-vet
        run: cargo vet --locked

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-22.04
    environment:
      name: >-
        ${{
          (github.ref_name == github.event.repository.default_branch ||
          github.ref_name == 'master') &&
          'security-audit' ||
          'security-audit-test'
        }}
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: ${{ vars.STEP_SECURITY_EGRESS_POLICY || 'block' }}
          allowed-endpoints: >-
            ${{ vars.COMMON_ALLOWED_ENDPOINTS }}
            ${{ vars.SECURITY_AUDIT_ALLOWED_ENDPOINTS }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get uv version from pyproject.toml
        shell: bash
        run: |
          echo "UV_VERSION=$(bash scripts/uv-version.sh)" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python
        run: uv python install 3.13

      - name: Run pip-audit
        run: >
          uv export --no-hashes --frozen |
          uv run --no-project --with pip-audit --
          pip-audit --disable-pip --no-deps -r /dev/stdin

  osv-scanner:
    name: osv-scanner
    runs-on: ubuntu-22.04
    environment:
      name: >-
        ${{
          (github.ref_name == github.event.repository.default_branch ||
          github.ref_name == 'master') &&
          'security-audit' ||
          'security-audit-test'
        }}
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: ${{ vars.STEP_SECURITY_EGRESS_POLICY || 'block' }}
          allowed-endpoints: >-
            ${{ vars.COMMON_ALLOWED_ENDPOINTS }}
            ${{ vars.SECURITY_AUDIT_ALLOWED_ENDPOINTS }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        with:
          scan-args: |
            --config=osv-scanner.toml
            --lockfile=Cargo.lock
            --lockfile=uv.lock
            --lockfile=python/uv.lock
