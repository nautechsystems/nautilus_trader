name: security-audit

# Supply chain security checks.
#
# Triggers:
#   - Nightly cron and manual dispatch: every audit job runs unconditionally.
#   - Push to test-security: every audit job runs unconditionally (test ramp).
#   - Pull requests and pushes to develop / master: a path-filtered gate job
#     decides whether the audit jobs run. Pushes / PRs that don't touch lock
#     files, manifests, audit config, or this workflow itself report the audit
#     jobs as `Skipped`, which satisfies required status checks without
#     surfacing transient advisory noise.

permissions:
  contents: read
  actions: read

env:
  # Fork PRs lack repo/org vars, so audit instead of block.
  EGRESS_POLICY: >-
    ${{ github.event.pull_request.head.repo.fork && 'audit'
    || vars.STEP_SECURITY_EGRESS_POLICY
    || 'block' }}

on:
  pull_request:
  push:
    branches: [develop, master, test-security]
  schedule:
    - cron: '0 12 * * *' # Daily at 12:00 UTC (2hrs prior to nightly-merge)
  workflow_dispatch: # Allow manual trigger

jobs:
  changes:
    name: changes
    runs-on: ubuntu-22.04
    outputs:
      audit_needed: ${{ steps.filter.outputs.audit_needed }}
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: ${{ env.EGRESS_POLICY }}
          allowed-endpoints: >-
            ${{ vars.COMMON_ALLOWED_ENDPOINTS }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect audit-relevant changes
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BRANCH: ${{ github.ref_name }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.event.after }}
        run: bash scripts/ci/security-audit-gate.sh

  cargo-audit:
    name: cargo-audit
    needs: changes
    if: needs.changes.outputs.audit_needed == 'true'
    runs-on: ubuntu-22.04
    environment:
      name: >-
        ${{
          (github.ref_name == github.event.repository.default_branch ||
          github.ref_name == 'master') &&
          'security-audit' ||
          'security-audit-test'
        }}
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: ${{ env.EGRESS_POLICY }}
          allowed-endpoints: >-
            ${{ vars.COMMON_ALLOWED_ENDPOINTS }}
            ${{ vars.SECURITY_AUDIT_ALLOWED_ENDPOINTS }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install cargo-audit
        uses: ./.github/actions/cargo-tool-install
        with:
          tool-name: cargo-audit

      - name: Run cargo-audit
        run: cargo audit

  cargo-deny:
    name: cargo-deny
    needs: changes
    if: needs.changes.outputs.audit_needed == 'true'
    runs-on: ubuntu-22.04
    environment:
      name: >-
        ${{
          (github.ref_name == github.event.repository.default_branch ||
          github.ref_name == 'master') &&
          'security-audit' ||
          'security-audit-test'
        }}
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: ${{ env.EGRESS_POLICY }}
          allowed-endpoints: >-
            ${{ vars.COMMON_ALLOWED_ENDPOINTS }}
            ${{ vars.SECURITY_AUDIT_ALLOWED_ENDPOINTS }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install cargo-deny
        uses: ./.github/actions/cargo-tool-install
        with:
          tool-name: cargo-deny

      - name: Run cargo-deny (advisories, licenses, sources, bans)
        run: cargo deny --all-features check advisories licenses sources bans

  cargo-vet:
    name: cargo-vet
    needs: changes
    if: needs.changes.outputs.audit_needed == 'true'
    runs-on: ubuntu-22.04
    environment:
      name: >-
        ${{
          (github.ref_name == github.event.repository.default_branch ||
          github.ref_name == 'master') &&
          'security-audit' ||
          'security-audit-test'
        }}
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: ${{ env.EGRESS_POLICY }}
          allowed-endpoints: >-
            ${{ vars.COMMON_ALLOWED_ENDPOINTS }}
            ${{ vars.SECURITY_AUDIT_ALLOWED_ENDPOINTS }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install cargo-vet
        uses: ./.github/actions/cargo-tool-install
        with:
          tool-name: cargo-vet

      - name: Run cargo-vet
        run: cargo vet --locked

  pip-audit:
    name: pip-audit
    needs: changes
    if: needs.changes.outputs.audit_needed == 'true'
    runs-on: ubuntu-22.04
    environment:
      name: >-
        ${{
          (github.ref_name == github.event.repository.default_branch ||
          github.ref_name == 'master') &&
          'security-audit' ||
          'security-audit-test'
        }}
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: ${{ env.EGRESS_POLICY }}
          allowed-endpoints: >-
            ${{ vars.COMMON_ALLOWED_ENDPOINTS }}
            ${{ vars.SECURITY_AUDIT_ALLOWED_ENDPOINTS }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get uv version from pyproject.toml
        shell: bash
        run: |
          echo "UV_VERSION=$(bash scripts/uv-version.sh)" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python
        run: uv python install 3.13

      - name: Run pip-audit
        run: >
          uv export --no-hashes --frozen |
          uv run --no-project --with pip-audit --
          pip-audit --disable-pip --no-deps -r /dev/stdin

  osv-scanner:
    name: osv-scanner
    needs: changes
    if: needs.changes.outputs.audit_needed == 'true'
    runs-on: ubuntu-22.04
    environment:
      name: >-
        ${{
          (github.ref_name == github.event.repository.default_branch ||
          github.ref_name == 'master') &&
          'security-audit' ||
          'security-audit-test'
        }}
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: ${{ env.EGRESS_POLICY }}
          allowed-endpoints: >-
            ${{ vars.COMMON_ALLOWED_ENDPOINTS }}
            ${{ vars.SECURITY_AUDIT_ALLOWED_ENDPOINTS }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        with:
          scan-args: |
            --config=osv-scanner.toml
            --lockfile=Cargo.lock
            --lockfile=uv.lock
            --lockfile=python/uv.lock
