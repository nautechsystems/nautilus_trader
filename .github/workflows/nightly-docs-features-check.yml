name: nightly-docs-features-check

# Documentation and feature compatibility checks - runs nightly and on-demand.
#
# Verifies docs.rs documentation builds and crate feature combinations compile correctly.

permissions:
  contents: read
  actions: read

on:
  push:
    branches: [test-docs-features]
  schedule:
    - cron: "0 12 * * *" # Daily at 12:00 UTC (same as security-audit)
  workflow_dispatch: # Allow manual trigger

jobs:
  docsrs-check:
    name: docsrs-check
    runs-on: [self-hosted, Linux, X64, self-hosted-linux-x86]
    env:
      # Outside the workspace so it survives actions/checkout's git clean -ffdx,
      # giving us persistent on-disk Rust artifact reuse between runs.
      CARGO_TARGET_DIR: /home/runner/.cache/cargo-target/docsrs-check
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: ${{ vars.STEP_SECURITY_EGRESS_POLICY || 'block' }}
          allowed-endpoints: >-
            ${{ vars.COMMON_ALLOWED_ENDPOINTS }}
            ${{ vars.CI_ALLOWED_ENDPOINTS }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Common setup
        uses: ./.github/actions/common-setup
        with:
          python-version: "3.13"
          # free-disk-space auto-skips on the nautilus-ci-runner-* pool.
          free-disk-space: "true"
          # Persistent CARGO_TARGET_DIR replaces Swatinem/rust-cache here.
          rust-cache-enabled: "false"

      - name: Install Rust nightly
        run: rustup toolchain install nightly

      # https://github.com/taiki-e/install-action
      - name: Install cargo-hack
        uses: taiki-e/install-action@b651345a718c8f44efa2460560b3dbf29cbd7ee1 # v2.75.26
        with:
          tool: cargo-hack

      - name: Run docsrs-check
        run: make docsrs-check

  check-features:
    name: check-features
    runs-on: [self-hosted, Linux, X64, self-hosted-linux-x86]
    env:
      # Outside the workspace so it survives actions/checkout's git clean -ffdx,
      # giving us persistent on-disk Rust artifact reuse between runs.
      CARGO_TARGET_DIR: /home/runner/.cache/cargo-target/check-features
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: ${{ vars.STEP_SECURITY_EGRESS_POLICY || 'block' }}
          allowed-endpoints: >-
            ${{ vars.COMMON_ALLOWED_ENDPOINTS }}
            ${{ vars.CI_ALLOWED_ENDPOINTS }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Common setup
        uses: ./.github/actions/common-setup
        with:
          python-version: "3.13"
          # free-disk-space auto-skips on the nautilus-ci-runner-* pool.
          free-disk-space: "true"
          # Persistent CARGO_TARGET_DIR replaces Swatinem/rust-cache here.
          rust-cache-enabled: "false"

      # https://github.com/taiki-e/install-action
      - name: Install cargo-hack
        uses: taiki-e/install-action@b651345a718c8f44efa2460560b3dbf29cbd7ee1 # v2.75.26
        with:
          tool: cargo-hack

      - name: Run check-features
        run: make check-features
