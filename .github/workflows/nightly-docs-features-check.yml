name: nightly-docs-features-check

# Documentation and feature compatibility checks - runs nightly and on-demand.
#
# Verifies docs.rs documentation builds and crate feature combinations compile correctly.

permissions:
  contents: read
  actions: read

on:
  push:
    branches: [test-docs-features]
  schedule:
    - cron: '0 12 * * *' # Daily at 12:00 UTC (same as security-audit)
  workflow_dispatch: # Allow manual trigger

jobs:
  docsrs-check:
    name: docsrs-check
    runs-on: depot-ubuntu-22.04-8
    steps:
      - uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: ${{ vars.STEP_SECURITY_EGRESS_POLICY || 'block' }}
          allowed-endpoints: >-
            ${{ vars.COMMON_ALLOWED_ENDPOINTS }}
            ${{ vars.CI_ALLOWED_ENDPOINTS }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get Rust toolchain version
        shell: bash
        run: echo "TOOLCHAIN=$(bash scripts/rust-toolchain.sh)" >> "$GITHUB_ENV"

      # https://github.com/actions-rust-lang/setup-rust-toolchain
      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c # v1.15.2
        with:
          toolchain: ${{ env.TOOLCHAIN }}
          override: true

      - name: Install Rust nightly
        run: rustup toolchain install nightly

      # https://github.com/taiki-e/install-action
      - name: Install cargo-hack
        uses: taiki-e/install-action@cede0bb282aae847dfa8aacca3a41c86d973d4d7 # v2.68.1
        with:
          tool: cargo-hack

      - name: Run docsrs-check
        run: make docsrs-check

  check-features:
    name: check-features
    runs-on: depot-ubuntu-22.04-8
    steps:
      - uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: ${{ vars.STEP_SECURITY_EGRESS_POLICY || 'block' }}
          allowed-endpoints: >-
            ${{ vars.COMMON_ALLOWED_ENDPOINTS }}
            ${{ vars.CI_ALLOWED_ENDPOINTS }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get Rust toolchain version
        shell: bash
        run: echo "TOOLCHAIN=$(bash scripts/rust-toolchain.sh)" >> "$GITHUB_ENV"

      # https://github.com/actions-rust-lang/setup-rust-toolchain
      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c # v1.15.2
        with:
          toolchain: ${{ env.TOOLCHAIN }}
          override: true

      - name: Install Cap'n Proto
        uses: ./.github/actions/install-capnp

      # https://github.com/taiki-e/install-action
      - name: Install cargo-hack
        uses: taiki-e/install-action@cede0bb282aae847dfa8aacca3a41c86d973d4d7 # v2.68.1
        with:
          tool: cargo-hack

      - name: Run check-features
        run: make check-features
