name: nightly-tests

# Extended test suites that are slow, large, or require special features for PR builds.

permissions:
  contents: read
  actions: read

on:
  push:
    branches: [test-nightly-tests]
  schedule:
    - cron: '0 12 * * *' # Daily at 12:00 UTC (same as security, 2hrs prior to nightly-merge)
  workflow_dispatch: # Allow manual trigger

jobs:
  turmoil:
    name: turmoil network tests
    runs-on: depot-ubuntu-22.04-8
    steps:
      # https://github.com/step-security/harden-runner
      - uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: ${{ vars.STEP_SECURITY_EGRESS_POLICY || 'block' }}
          allowed-endpoints: >-
            ${{ vars.COMMON_ALLOWED_ENDPOINTS }}
            ${{ vars.CI_ALLOWED_ENDPOINTS }}

      - name: Checkout repository
        # https://github.com/actions/checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Common setup
        uses: ./.github/actions/common-setup
        with:
          python-version: "3.13"
          free-disk-space: "true"

      - name: Run turmoil network tests
        env:
          RUST_BACKTRACE: 1
        run: cargo nextest run -p nautilus-network --features turmoil --cargo-profile nextest --status-level fail

  build-macos:
    name: build-macos (nightly)
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"
    defaults:
      run:
        shell: bash
    env:
      BUILD_MODE: release
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/build-macos-test-py${{ matrix.python-version }}
      RUST_BACKTRACE: 1
    steps:
      # https://github.com/step-security/harden-runner
      - uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: ${{ vars.STEP_SECURITY_EGRESS_POLICY || 'block' }}
          allowed-endpoints: >-
            ${{ vars.COMMON_ALLOWED_ENDPOINTS }}
            ${{ vars.CI_ALLOWED_ENDPOINTS }}

      - name: Checkout repository
        # https://github.com/actions/checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Log macOS runner version
        run: |
          echo "::group::macOS runner info"
          sw_vers
          uname -a
          echo "::endgroup::"

      - name: Common setup
        uses: ./.github/actions/common-setup
        with:
          python-version: ${{ matrix.python-version }}
          free-disk-space: "true"
          rust-cache-key: build-macos-test-${{ matrix.python-version }}
          rust-cache-workspaces: . -> target/build-macos-test-py${{ matrix.python-version }}
          rust-cache-on-failure: "false"

      - name: Cached test data
        uses: ./.github/actions/common-test-data

      - name: Set compile jobs from cache state
        run: bash scripts/ci/set-cargo-build-jobs.sh

      - name: Run Rust tests (core)
        run: make cargo-test-core EXTRA_FEATURES="capnp,hypersync" NEXTEST_PROFILE=ci

      - name: Run Rust tests (adapters)
        run: make cargo-test-adapters EXTRA_FEATURES="capnp,hypersync" NEXTEST_PROFILE=ci

      - name: Build and install wheel
        uses: ./.github/actions/common-wheel-build
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target/build-macos-wheel-py${{ matrix.python-version }}
          PARALLEL_BUILD: false
        with:
          python-version: ${{ matrix.python-version }}
          github_ref: ${{ github.ref }}

      - name: Run tests
        run: |
          uv run --no-sync pytest --ignore=tests/performance_tests --reruns 2 --reruns-delay 1
