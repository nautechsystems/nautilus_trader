  merge-jupyterlab:
    name: merge-jupyterlab
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
      attestations: write
    needs: build-docker-images-jupyterlab
    steps:
      # https://github.com/step-security/harden-runner
