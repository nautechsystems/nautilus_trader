name: Build Trading Engine Image
# comment test

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        # https://github.com/actions/checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Set image name (lowercase)
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/trading-engine" >> "$GITHUB_OUTPUT"

      - name: Free disk space
        # https://github.com/jlumbroso/free-disk-space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        # https://github.com/docker/setup-buildx-action
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        # https://github.com/docker/login-action
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Trading Engine Image
        # https://github.com/docker/build-push-action
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: .docker/nautilus_trader.dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image details
        run: |
          echo "✅ Trading Engine image built and pushed:"
          echo "   - ${{ steps.image.outputs.name }}:${{ github.sha }}"
          echo "   - ${{ steps.image.outputs.name }}:latest"
          echo ""
          echo "To use in production, set:"
          echo "   TRADING_ENGINE_IMAGE=${{ steps.image.outputs.name }}:latest"
