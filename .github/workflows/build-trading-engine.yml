name: Build Trading Engine Image

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/trading-engine

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Trading Engine Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/nautilus_trader.dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image details
        run: |
          echo "✅ Trading Engine image built and pushed:"
          echo "   - ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "   - ${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "To use in production, set:"
          echo "   TRADING_ENGINE_IMAGE=${{ env.IMAGE_NAME }}:latest"
